# =============================================================================
# RAG Pipeline - Logging Configuration
# =============================================================================
# Change the 'level' field under handlers or loggers to control verbosity.
# Valid levels: DEBUG, INFO, WARNING, ERROR, CRITICAL

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s:%(lineno)d | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  detailed:
    format: "%(asctime)s | %(levelname)-8s | %(name)s:%(funcName)s:%(lineno)d | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/rag_pipeline.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

loggers:
  rag_pipeline:
    level: DEBUG
    handlers: [console, file]
    propagate: false

root:
  level: WARNING
  handlers: [console]
